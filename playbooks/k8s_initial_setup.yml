---

- name: k8s dependencies setup (raspberry pis/all nodes). Does not include container runtime or kubernetes installation. 
  hosts: node3
  become: true 
  tasks: 


    - name: turn off swap 
      ansible.builtin.shell: 
        cmd: "sudo swapoff -a"
      when: ansible_facts['swaptotal_mb'] > 0
      
    - name: back up fstab
      ansible.builtin.copy:
        src: /etc/fstab
        dest: /etc/fstab.bak
        remote_src: yes

    - name: remove swap from fstab 
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: 'swap'
        state: absent
    - name: set up cron to diable pi swap job 1
      ansible.builtin.cron:
        name: disable swap 
        special_time: reboot
        job: "swapoff -a" 

    - name: set up cron to diable pi swap job 2 
      ansible.builtin.cron:
        name: disable swap 2
        special_time: reboot
        job: "rm /var/swap" 

    - name: install firewalld 
      ansible.builtin.apt: 
        name: firewalld
        state: present

    - name: update
      ansible.builtin.apt: 
        name: '*'
        state: latest
   
    - name: enable firewalld 
      ansible.builtin.service: 
        name: firewalld
        state: started
        enabled: true

    - name: Set up SSH access on firewalld
      ansible.posix.firewalld:
        service: ssh
        permanent: true
        state: enabled
      notify: restart_firewall

    - name: Set up k8s ports for firewalld 
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
      loop: "{{ kube_ports }}"
      notify: restart_firewall


    - name: Enable br_netfilter kernel module
      modprobe:
        name: "{{ item }}"
        state: present
      become: True
      loop:
       - br_netfilter
       - overlay
    
    - name: Enable packet forwarding on the node
      sysctl:
        name: "{{ item }}"
        value: 1
        sysctl_set: True
        state: present
        reload: yes
      become: True
      loop:
       - "net.ipv4.ip_forward"
       - "net.bridge.bridge-nf-call-iptables"
       - "net.bridge.bridge-nf-call-ip6tables"
    
    - name: Persist br_netfilter kernell module loading (on reboot)
      copy:
        dest: "/etc/modules-load.d/{{ item }}.conf"
        content: "{{ item }}"
      become: True
      loop:
       - br_netfilter
       - overlay
 
    - name: Reload systemctl daemons
      systemd:
        daemon_reload: yes
      become: True
  
  handlers: 
    - name: restart_firewall
      ansible.builtin.service:
        name: firewalld
        state: restarted  
